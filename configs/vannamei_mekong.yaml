# Xoceania-sim: Vietnamese intensive Penaeus vannamei pond — Mekong Delta
# Reference: Boyd & Tucker (1998), Martinez-Cordova et al. (2009)
# Typical intensive shrimp pond in the Ca Mau / Bac Lieu provinces

pond:
  depth_m: 1.5                  # Mean water depth (m)
  area_m2: 5000.0               # Pond surface area (m²)
  salinity_ppt: 15.0            # Salinity (ppt); coastal Mekong: 10-25 ppt
  alkalinity_mg_L: 120.0        # Total alkalinity as CaCO3 (mg/L)
  latitude_deg: 9.5             # Ca Mau province latitude (°N)
  longitude_deg: 105.0          # Ca Mau province longitude (°E)
  extinction_coef_m: 1.8        # Light extinction k_d (m⁻¹); eutrophic ponds: 1-5
  surface_albedo: 0.06          # Water surface albedo
  n_aerators: 2                 # Number of paddlewheel aerators
  aerator_power_kW: 2.0         # Power per aerator (kW)
  aerator_kLa_20: 0.8           # Reaeration rate per aerator at 20°C (h⁻¹)
  sod_g_m2_d: 2.0               # Sediment oxygen demand (g O2/m²/day)
  sod_theta: 1.065              # SOD temperature coefficient (Bowie et al. 1985)
  wind_reaeration_coef: 0.017   # Boyd & Teichert-Coddington (1992)
  wind_reaeration_offset: 0.014
  reaeration_theta: 1.024       # Wind reaeration temperature coefficient

shrimp:
  initial_weight_g: 1.0         # Initial post-larvae weight (g)
  target_weight_g: 20.0         # Target harvest weight (g)
  stocking_density_m2: 100.0    # Stocking density (PL/m²); intensive: 60-150
  initial_survival: 1.0
  fcr: 1.5                      # Feed conversion ratio; vannamei typical: 1.3-1.7
  resp_coef_a: 0.30             # Respiration allometric coef (Rosas et al. 2001)
  resp_coef_b: -0.25            # Respiration mass exponent (Rosas et al. 2001)
  resp_theta: 1.08              # Respiratory Arrhenius θ
  resp_do_half_sat: 2.0         # DO half-saturation for respiration (mg/L)
  tan_per_feed: 0.025           # TAN per g feed (Hargreaves 1998: ~2.5%)
  stress_do_threshold: 2.0      # DO below which stress mortality begins (mg/L)
  stress_nh3_threshold: 0.10    # Un-ionized NH3 stress threshold (mg/L)
  stress_mortality_rate: 0.05   # Additional daily mortality at max stress (fraction/day)
  t_opt: 28.0                   # Optimal temperature (°C)
  t_max: 35.0                   # Maximum temperature (°C)
  feed_table_weight: [1.0, 2.0, 3.0, 5.0, 7.0, 10.0, 15.0, 20.0]
  feed_table_pct_bw:  [8.0, 7.0, 6.0, 5.0, 4.5,  4.0,  3.0,  2.5]

weather:
  t_mean_C: 28.0                # Mean air temperature (°C); Mekong Delta annual mean
  t_amplitude_C: 8.0            # Daily temperature range ΔT (°C)
  t_min_hour: 6.0               # Hour of minimum temperature (06:00 local)
  rh_mean: 0.80                 # Mean relative humidity (fraction)
  wind_speed_ms: 3.0            # Mean wind speed at 3 m height (m/s)
  cloud_cover: 0.20             # Cloud cover fraction (0=clear, 1=overcast)
  day_of_year: 200              # Day of year for solar calculations (July 19)

# Simulation settings
dt_hours: 1.0
t_end_days: 90.0               # Full crop cycle: ~90-120 days
solver_method: LSODA
rtol: 1.0e-6
atol: 1.0e-9

# Initial conditions
initial_do: 7.0                 # mg/L
initial_temp: 28.0              # °C
initial_CT: 2.5                 # mmol/L total dissolved inorganic carbon
initial_TAN: 0.1                # mg N/L
initial_algae: 50.0             # mg Chl-a/m³
